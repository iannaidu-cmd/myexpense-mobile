name: EAS Build Inspect

on:
  workflow_dispatch:
    inputs:
      platform:
        description: Platform to inspect
        required: true
        default: android
        type: choice
        options: [android, ios]
      profile:
        description: EAS build profile
        required: true
        default: preview
        type: choice
        options: [development, preview, production]

jobs:
  inspect:
    name: eas build:inspect (${{ inputs.platform }} / ${{ inputs.profile }})
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: EAS build inspect
        run: |
          eas build:inspect \
            --platform ${{ inputs.platform }} \
            --profile ${{ inputs.profile }} \
            --output /tmp/eas-inspect \
            --force
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_REVENUECAT_IOS_KEY: ${{ secrets.EXPO_PUBLIC_REVENUECAT_IOS_KEY }}
          EXPO_PUBLIC_REVENUECAT_ANDROID_KEY: ${{ secrets.EXPO_PUBLIC_REVENUECAT_ANDROID_KEY }}
          EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.EXPO_PUBLIC_SENTRY_DSN }}

      - name: Upload inspect bundle
        uses: actions/upload-artifact@v7
        with:
          name: eas-inspect-${{ inputs.platform }}-${{ inputs.profile }}
          path: /tmp/eas-inspect
          retention-days: 7
