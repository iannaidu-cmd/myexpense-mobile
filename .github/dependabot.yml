version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Africa/Johannesburg
    open-pull-requests-limit: 10
    groups:
      expo-sdk:
        patterns: ["expo", "expo-*", "@expo/*"]
      react-native:
        patterns: ["react-native", "react-native-*", "@react-native/*", "@react-native-*/*"]
      supabase:
        patterns: ["@supabase/*"]
    ignore:
      # Major expo SDK upgrades require manual migration
      - dependency-name: expo
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Africa/Johannesburg
    open-pull-requests-limit: 5
